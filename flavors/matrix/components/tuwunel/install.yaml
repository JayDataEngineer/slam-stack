# Slam Stack — Tuwunel Matrix Homeserver (Rust)
# Lightweight Matrix homeserver, successor to Conduit/Conduwuit.
# Auth: OIDC via Kanidm (MSC3861), fallback registration token for bootstrap.
# Config: conduwuit-style [global] + top-level [oauth2] section
---
apiVersion: v1
kind: Namespace
metadata:
  name: matrix
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tuwunel-config
  namespace: matrix
data:
  tuwunel.toml: |
    [global]
    server_name = "slamstack.internal"
    address = ["0.0.0.0"]
    port = 8008
    allow_federation = false
    allow_registration = true
    registration_token = "changeme-please-use-a-real-token"
    database_path = "/var/lib/tuwunel"
    log = "warn"

    [oauth2]
    enabled = true
    issuer = "https://kanidm.identity.svc.cluster.local/oauth2/openid/tuwunel"
    client_id = "tuwunel"
    client_secret_file = "/etc/tuwunel/oidc/oidc_client_secret"
    scopes = ["openid", "profile", "email"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tuwunel-data
  namespace: matrix
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuwunel
  namespace: matrix
  labels:
    app: tuwunel
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tuwunel
  template:
    metadata:
      labels:
        app: tuwunel
    spec:
      serviceAccountName: tuwunel
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
      containers:
        - name: tuwunel
          image: ghcr.io/matrix-construct/tuwunel:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/tuwunel/tuwunel.toml
          ports:
            - containerPort: 8008
              name: client
              protocol: TCP
            - containerPort: 8448
              name: federation
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/tuwunel
              readOnly: true
            - name: data
              mountPath: /var/lib/tuwunel
            - name: oidc
              mountPath: /etc/tuwunel/oidc
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /_matrix/client/versions
              port: 8008
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: tuwunel-config
        - name: data
          persistentVolumeClaim:
            claimName: tuwunel-data
        - name: oidc
          secret:
            secretName: tuwunel-oidc
---
apiVersion: v1
kind: Service
metadata:
  name: tuwunel
  namespace: matrix
  labels:
    app: tuwunel
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 8008
      targetPort: 8008
      protocol: TCP
    - name: federation
      port: 8448
      targetPort: 8448
      protocol: TCP
  selector:
    app: tuwunel
---
# tuwunel-oidc secret is created by the OAuth2 client registration
# script in flavors/matrix/policies/oauth2-client.yaml
