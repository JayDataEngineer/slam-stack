# Slam Stack — Matrix Flavor Cluster Overlay
# Core infra + Matrix flavor (Tuwunel, Cinny, LiveKit).
# Point Flux bootstrap at this path for the Matrix stack.
#   flux bootstrap ... --path=./clusters/matrix
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/sources
  - ../../components
  - ../../flavors/matrix
