# Slam Stack — Matrix Flavor Cluster Overlay
# Creates Flux Kustomization CRDs with layered dependsOn for ordered deployment.
#   Phase 0–4: common core infrastructure
#   Phase 5 (flavor): tuwunel, cinny, livekit
#
# Point Flux bootstrap at this path:
#   flux bootstrap ... --path=./clusters/matrix
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../common
  - flavor.yaml
