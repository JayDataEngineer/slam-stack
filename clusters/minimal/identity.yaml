# slam-minimal-identity — Kanidm + Headscale
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: slam-identity
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/minimal/phases/03-identity
  prune: true
  wait: true
  dependsOn:
    - name: slam-platform
