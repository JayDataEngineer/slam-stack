# slam-minimal-platform — cert-manager + Vault
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: slam-platform
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/minimal/phases/02-platform
  prune: true
  wait: true
  dependsOn:
    - name: slam-cni
