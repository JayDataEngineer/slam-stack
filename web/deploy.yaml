# Slam Stack — Web Dashboard K8s Deployment
# The management UI built with Leptos + Axum
---
apiVersion: v1
kind: Namespace
metadata:
  name: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slam-stack-web
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slam-stack-web
  template:
    metadata:
      labels:
        app: slam-stack-web
    spec:
      serviceAccountName: slam-stack-web
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        fsGroup: 10000
      containers:
        - name: slam-stack-web
          image: registry.registry.svc.cluster.local:5000/slam-stack-web:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LEPTOS_SITE_ADDR
              value: "0.0.0.0:8080"
            - name: LEPTOS_SITE_ROOT
              value: "/usr/local/share/slam-stack-web"
            - name: LEPTOS_OUTPUT_NAME
              value: "slam-stack-web"
            - name: SURREALDB_URL
              value: "http://surrealdb.database.svc.cluster.local:8000"
            - name: SURREALDB_NS
              value: "slamstack"
            - name: SURREALDB_DB
              value: "dashboard"
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: web-db-credentials
                  key: username
                  optional: true
            - name: SURREALDB_PASS
              valueFrom:
                secretKeyRef:
                  name: web-db-credentials
                  key: password
                  optional: true
            - name: OIDC_ISSUER
              value: "https://kanidm.identity.svc.cluster.local/oauth2/openid/slam-stack-web"
            - name: OIDC_CLIENT_ID
              value: "slam-stack-web"
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: web-oidc-credentials
                  key: client-secret
            - name: OIDC_REDIRECT_URL
              value: "https://slamstack.internal/auth/callback"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: web-oidc-credentials
                  key: session-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: slam-stack-web
  namespace: web
spec:
  type: ClusterIP
  selector:
    app: slam-stack-web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
