# Slam Stack — Production Controlplane Configuration
# This is the "Root of Trust" config. Handle with extreme care.
version: v1alpha1
machine:
  type: controlplane
  # === TPM-Bound Disk Encryption ===
  features:
    diskEncryption:
      ephemeral:
        provider: luks2
        keys:
          - slot: 0
            tpm: {}
      state:
        provider: luks2
        keys:
          - slot: 0
            tpm: {}
    kmsg: false
    rbac: true
  # === Kernel Hardening ===
  sysctls:
    net.ipv4.tcp_syncookies: "1"
    net.ipv4.conf.all.rp_filter: "1"
    net.ipv4.conf.default.rp_filter: "1"
    net.ipv4.ip_forward: "0"
    net.ipv6.conf.all.disable_ipv6: "1"
    net.ipv6.conf.default.disable_ipv6: "1"
    kernel.kptr_restrict: "2"
    kernel.dmesg_restrict: "1"
    kernel.printk: "3 3 3 3"
    kernel.unprivileged_bpf_disabled: "1"
    net.core.bpf_jit_harden: "2"
    kernel.ftrace_enabled: "0"
    kernel.kexec_load_disabled: "1"
    kernel.sysrq: "0"
    vm.unprivileged_userfaultfd: "0"
    user.max_user_namespaces: "0"
  # === Module Blacklist ===
  kernel:
    modules:
      - name: "usb-storage"
      - name: "bluetooth"
      - name: "floppy"
      - name: "squashfs"
      - name: "cifs"
      - name: "nfsv3"
      - name: "nfsv4"
      - name: "can"
      - name: "btusb"
  # === Secure Boot + Signing ===
  install:
    disk: /dev/sda
    image: ghcr.io/siderolabs/installer:latest
    bootloader: grub
    secureboot: true
  # === No Shell, No SSH (structural — Talos has none) ===
  # This is inherent to Talos. No config needed.
  # === Network: Zero inbound by default ===
  network:
    interfaces:
      - interface: eth0
        addresses: []
        vip:
          ip: ""  # set your LB VIP here in prod
    extraHostEntries: []
  # === Registries (air-gap ready) ===
  registries:
    mirrors:
      docker.io:
        endpoints:
          - https://registry-1.docker.io
    config:
      ghcr.io:
        auth:
          username: ""
          password: ""
cluster:
  network:
    cni:
      name: none  # Cilium manages everything
    podSubnets:
      - "10.244.0.0/16"
    serviceSubnets:
      - "10.96.0.0/12"
  proxy:
    disabled: true
  # === mTLS API (default in Talos, reinforced here) ===
  apiServer:
    certSANs:
      - "127.0.0.1"
      - "::1"
      - "localhost"
    disableOpportunisticEarlyConnections: true
    auditing:
      enabled: true
      logPath: /var/log/audit/kube-apiserver-audit.log
      policy:
        apiVersion: audit.k8s.io/v1
        kind: Policy
        rules:
          - level: RequestResponse
            resources:
              - group: ""
                resources: ["secrets", "configmaps"]
          - level: Metadata
            verbs: ["create", "delete", "patch", "update"]
          - level: None
            users: ["system:kube-controller-manager"]
            verbs: ["get", "list", "watch"]
  # === etcd hardening ===
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.17
    extraArgs:
      auto-compaction-mode: periodic
      auto-compaction-retention: "72h"
      quota-backend-bytes: "8589934592"  # 8GB
    clientTls:
      certSANs: []
    peerTls:
      certSANs: []
