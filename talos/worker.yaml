# Slam Stack — Production Worker Configuration
version: v1alpha1
machine:
  type: worker
  # === TPM-Bound Disk Encryption (same as controlplane) ===
  features:
    diskEncryption:
      ephemeral:
        provider: luks2
        keys:
          - slot: 0
            tpm: {}
      state:
        provider: luks2
        keys:
          - slot: 0
            tpm: {}
    kmsg: false
    rbac: true
  # === Kernel Hardening (same as controlplane) ===
  sysctls:
    net.ipv4.tcp_syncookies: "1"
    net.ipv4.conf.all.rp_filter: "1"
    net.ipv4.conf.default.rp_filter: "1"
    net.ipv4.ip_forward: "0"
    net.ipv6.conf.all.disable_ipv6: "1"
    net.ipv6.conf.default.disable_ipv6: "1"
    kernel.kptr_restrict: "2"
    kernel.dmesg_restrict: "1"
    kernel.printk: "3 3 3 3"
    kernel.unprivileged_bpf_disabled: "1"
    net.core.bpf_jit_harden: "2"
    kernel.ftrace_enabled: "0"
    kernel.kexec_load_disabled: "1"
    kernel.sysrq: "0"
    vm.unprivileged_userfaultfd: "0"
    user.max_user_namespaces: "0"
  kernel:
    modules:
      - name: "usb-storage"
      - name: "bluetooth"
      - name: "floppy"
      - name: "squashfs"
      - name: "cifs"
      - name: "nfsv3"
      - name: "nfsv4"
      - name: "can"
      - name: "btusb"
  install:
    disk: /dev/sda
    image: ghcr.io/siderolabs/installer:latest
    bootloader: grub
    secureboot: true
  network:
    interfaces:
      - interface: eth0
    extraHostEntries: []
cluster:
  network:
    cni:
      name: none
    podSubnets:
      - "10.244.0.0/16"
    serviceSubnets:
      - "10.96.0.0/12"
  proxy:
    disabled: true
