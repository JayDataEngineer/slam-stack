# Non-compliant Pod — writable root filesystem, must be rejected.
---
apiVersion: v1
kind: Namespace
metadata:
  name: test-workload
---
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: false
metadata:
  name: test-app-sa
  namespace: test-workload
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-writable-rootfs-pod
  namespace: test-workload
spec:
  serviceAccountName: test-app-sa
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
  containers:
    - name: app
      image: nginx:latest
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        readOnlyRootFilesystem: false
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
