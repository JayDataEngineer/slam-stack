# Slam Stack — Backup RBAC
# Minimal permissions for the backup CronJob
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-runner
  namespace: backup
automountServiceAccountToken: false
---
apiVersion: v1
kind: Secret
metadata:
  name: cosign-keys
  namespace: backup
type: Opaque
data:
  # Cosign signing key — copy from components/cosign/
  cosign.key: ""
  cosign.pub: ""
