# Slam Stack — Dedicated ServiceAccounts
# Every component gets its own SA with no automounted tokens
# Apply BEFORE rbac-policies.yaml so pods can reference these SAs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: slam-stack-web
  namespace: web
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kanidm
  namespace: identity
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rustfs
  namespace: storage
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: registry
  namespace: registry
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: slam-stack-pg
  namespace: database
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: headscale
  namespace: network
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-runner
  namespace: backup
automountServiceAccountToken: false
