---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  chart:
    spec:
      chart: kyverno
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 1h
  values:
    replicaCount: 1
    extraArgs:
      - --webhooktimeout=15
      - --autogenInternals=true
    podSecurityStandard: restricted
    securityContext:
      runAsNonRoot: true
      runAsUser: 10000
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    config:
      resourceFilters: >-
        [{"namespace":"kyverno","kind":"*","name":"*"},
         {"namespace":"kube-system","kind":"*","name":"*"},
         {"namespace":"cert-manager","kind":"*","name":"*"}]
      webhooks:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                  - kyverno
                  - kube-system
                  - cert-manager
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
