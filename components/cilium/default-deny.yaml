# Slam Stack — Default Deny Network Policy
# No pod can talk to any other pod unless explicitly allowed.
# Apply this first, then create permissive policies only where needed.
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  description: "Default deny all ingress traffic cluster-wide"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            {}
  egress:
    - toEndpoints:
        - matchLabels:
            {}
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns
spec:
  description: "Allow DNS resolution for all pods"
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-egress-internet
spec:
  description: "Default deny all egress to internet (override per-service)"
  endpointSelector: {}
  egress:
    - toCIDR:
        - 0.0.0.0/0
      fromEndpoints:
        - matchLabels:
            {}
