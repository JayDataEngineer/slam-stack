# Slam Stack — Service-Specific Network Policies (Cilium)
# Each rule explicitly allows the minimum required communication.
# Everything else is denied by the cluster-wide default-deny policy.
#
# Architecture:
#   Ingress  → Headscale/Cloudflare Tunnel → services
#   Kanidm   ← OIDC consumers (everything talks to Kanidm on 443)
#   Vault    ← apps needing secrets (on 8200)
#   SurrealDB ← apps needing database (on 8000)
#   Stalwart  ← mail clients (on 443/465)
#   VictoriaLogs ← apps sending audit logs (on 8480)
#   RustFS   ← apps needing object storage (on 9000)
#   Registry ← kube-system pull, vault secrets (on 5000)
#   Apps NEVER talk to each other unless explicitly allowed
#   Apps NEVER talk to the internet unless explicitly allowed
---
# === Allow traffic to Kanidm (OIDC auth) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-kanidm
  namespace: identity
spec:
  endpointSelector:
    matchLabels:
      app: kanidm
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network  # Headscale
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": mail  # Stalwart
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault  # Vault
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database  # SurrealDB
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": web  # Dashboard
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === Allow pod-to-pod traffic to SurrealDB ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-surrealdb
  namespace: database
spec:
  endpointSelector:
    matchLabels:
      app: surrealdb
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault  # Vault for dynamic creds
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": web  # Dashboard
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === Allow traffic to Vault ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-vault
  namespace: vault
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": default
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": mail
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": storage  # RustFS for KMS
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": web
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
  egress:
    # Vault talks to SurrealDB ONLY (not entire database namespace)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database
            app: surrealdb
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
            app: kanidm
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# === Allow traffic to VictoriaLogs (audit ingestion) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-victoria-logs
  namespace: observability
spec:
  endpointSelector:
    matchLabels:
      app: victoria-logs
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system  # Tetragon, Cilium
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault  # Vault audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity  # Kanidm audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database  # SurrealDB audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": mail  # Stalwart audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": storage  # RustFS/Mayastor audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network  # Headscale audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": comms  # SimpleX audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === Allow traffic to RustFS (object storage) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-rustfs
  namespace: storage
spec:
  endpointSelector:
    matchLabels:
      app: rustfs
  ingress:
    # S3 API — only workloads that need object storage
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database  # SurrealDB backups
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": backup  # Backup CronJob
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Admin API — only Vault for credential rotation
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault
      toPorts:
        - ports:
            - port: "9001"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
---
# === Allow traffic to Stalwart (JMAP mail) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-stalwart
  namespace: mail
spec:
  endpointSelector:
    matchLabels:
      app: stalwart
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network  # Headscale tunnel
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "465"
              protocol: TCP
            - port: "993"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
            app: kanidm
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    # DNS (required for DNSBL spam filtering and outbound MX lookups)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
# === Headscale mesh VPN ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-headscale
  namespace: network
spec:
  endpointSelector:
    matchLabels:
      app: headscale
  ingress:
    # Headscale receives DERP traffic and coordination
    - fromEndpoints:
        - matchLabels: {}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
            app: kanidm
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === Registry (local container images) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-registry
  namespace: registry
spec:
  endpointSelector:
    matchLabels:
      app: registry
  ingress:
    # Only kube-system can pull images (kubelet)
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
    # Kyverno needs to verify images during admission
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kyverno
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
# === Web Dashboard ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-web
  namespace: web
spec:
  endpointSelector:
    matchLabels:
      app: slam-stack-web
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network  # Headscale
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
            app: kanidm
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database
            app: surrealdb
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
# === SimpleX SMP server (secure messaging relay) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-smp-server
  namespace: comms
spec:
  endpointSelector:
    matchLabels:
      app: smp-server
  ingress:
    # Only reachable via Headscale mesh VPN
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network
      toPorts:
        - ports:
            - port: "5223"
              protocol: TCP
            - port: "443"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === SimpleX XFTP server (file transfer relay) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-xftp-server
  namespace: comms
spec:
  endpointSelector:
    matchLabels:
      app: xftp-server
  ingress:
    # Only reachable via Headscale mesh VPN
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    # XFTP may need to reach SMP server for notifications
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": comms
            app: smp-server
      toPorts:
        - ports:
            - port: "5223"
              protocol: TCP
---
# === Mayastor storage ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-mayastor
  namespace: storage
spec:
  endpointSelector:
    matchLabels:
      app: mayastor
  ingress:
    # CSI driver from kube-system
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
      toPorts:
        - ports:
            - port: "10124"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
