# Slam Stack — Service-Specific Network Policies (Cilium)
# Each rule explicitly allows the minimum required communication.
# Everything else is denied by the cluster-wide default-deny policy.
#
# Architecture:
#   Ingress  → Headscale mesh VPN → services
#   Kanidm   ← OIDC consumers (everything talks to Kanidm on 443)
#   Vault    ← apps needing secrets (on 8200)
#   VictoriaLogs ← apps sending audit logs (on 8480)
#   RustFS   ← apps needing object storage (on 9000)
#   Registry ← kube-system pull, vault secrets (on 5000)
#   Apps NEVER talk to each other unless explicitly allowed
#   Apps NEVER talk to the internet unless explicitly allowed
---
# === Allow traffic to Kanidm (OIDC auth) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-kanidm
  namespace: identity
spec:
  endpointSelector:
    matchLabels:
      app: kanidm
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network  # Headscale
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": mail  # Stalwart
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault  # Vault
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database  # SurrealDB
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": web  # Dashboard
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === Allow traffic to PostgreSQL (CNPG) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-postgres
  namespace: database
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: slam-stack-pg
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": web
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": backup
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === Allow traffic to Vault ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-vault
  namespace: vault
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": default
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": mail
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": storage  # RustFS for KMS
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": web
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
  egress:
    # Vault talks to PostgreSQL for dynamic credential management
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database
            cnpg.io/cluster: slam-stack-pg
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
            app: kanidm
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# === Allow traffic to VictoriaLogs (audit ingestion) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-victoria-logs
  namespace: observability
spec:
  endpointSelector:
    matchLabels:
      app: victoria-logs
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system  # Tetragon, Cilium
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault  # Vault audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity  # Kanidm audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database  # SurrealDB audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": mail  # Stalwart audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": storage  # RustFS/Mayastor audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network  # Headscale audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": comms  # SimpleX audit
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === Allow traffic to VictoriaMetrics (metrics + alerting) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-victoria-metrics
  namespace: observability
spec:
  endpointSelector:
    matchLabels:
      app: victoria-metrics
  ingress:
    # Scrape targets (self-monitoring)
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
      toPorts:
        - ports:
            - port: "8428"
              protocol: TCP
  egress:
    # Scrape kube-system (Cilium, Tetragon, kubelet)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
            - port: "9091"
              protocol: TCP
            - port: "9965"
              protocol: TCP
    # Scrape self
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
      toPorts:
        - ports:
            - port: "8428"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
# === Backup CronJob ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-backup-egress
  namespace: backup
spec:
  endpointSelector:
    matchLabels: {}
  egress:
    # Upload backups to RustFS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": storage
            app: rustfs
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
# === Allow traffic to RustFS (object storage) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-rustfs
  namespace: storage
spec:
  endpointSelector:
    matchLabels:
      app: rustfs
  ingress:
    # S3 API — only workloads that need object storage
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database  # PostgreSQL backups
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": backup  # Backup CronJob
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Admin API — only Vault for credential rotation
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault
      toPorts:
        - ports:
            - port: "9001"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
---
# === Headscale mesh VPN ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-headscale
  namespace: network
spec:
  endpointSelector:
    matchLabels:
      app: headscale
  ingress:
    # Headscale receives coordination from mesh nodes only
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
            app: kanidm
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# === Registry (local container images) ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-registry
  namespace: registry
spec:
  endpointSelector:
    matchLabels:
      app: registry
  ingress:
    # Only kube-system can pull images (kubelet)
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
    # Kyverno needs to verify images during admission
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kyverno
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
# === Web Dashboard ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-web
  namespace: web
spec:
  endpointSelector:
    matchLabels:
      app: slam-stack-web
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": network  # Headscale
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": identity
            app: kanidm
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": database
            cnpg.io/cluster: slam-stack-pg
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
# === Mayastor storage ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-to-mayastor
  namespace: storage
spec:
  endpointSelector:
    matchLabels:
      app: mayastor
  ingress:
    # CSI driver from kube-system
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
      toPorts:
        - ports:
            - port: "10124"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
            app: victoria-logs
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
