# Slam Stack - PostgreSQL via CloudNativePG
# Hardened PostgreSQL 16 with pgAudit, managed by CNPG operator
# CNPG auto-generates superuser credentials in slam-stack-pg-superuser secret
---
apiVersion: v1
kind: Namespace
metadata:
  name: database
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: slam-stack-pg
  namespace: database
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  instances: 1

  bootstrap:
    initdb:
      database: dashboard
      owner: postgres

  storage:
    size: 20Gi
    storageClass: mayastor

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

  postgresql:
    shared_preload_libraries:
      - pgaudit
    parameters:
      pgaudit.log: "write"
      pgaudit.log_level: "log"
      pgaudit.log_parameter: "on"
      password_encryption: "scram-sha-256"
      log_connections: "on"
      log_disconnections: "on"

  monitoring:
    enablePodMonitor: true

  managed:
    services:
      disabledDefaultServices:
        - ro
