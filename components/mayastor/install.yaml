# Mayastor — NVMe-oF storage engine via SPDK
# See: https://mayastor.gitbook.io/
# Requires kernel modules: nvme-tcp, nvme-rdma
mayastor:
  # Single replica for dev, 3+ for prod
  replicaCount: 1
  csi:
    node:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
  agents:
    core:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
  pools:
    # Default pool on each node — LUKS encrypted at rest
    default:
      - node: "*"
        type: lvm
        device: /dev/sdb
        # Encryption is handled at the LUKS layer below the pool.
        # The node preparation script creates a LUKS container on /dev/sdb
        # before Mayastor uses it. Key is managed by Vault Transit engine.
  ioEngine:
    resources:
      requests:
        hugepages-2Mi: 512Mi
      limits:
        hugepages-2Mi: 512Mi
