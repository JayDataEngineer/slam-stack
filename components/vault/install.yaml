# Slam Stack — OpenBao / Vault Install
# Ephemeral secrets with dynamic rotation
# Install: helm repo add openbao https://openbao.github.io/openbao-helm && helm upgrade --install vault openbao/openbao -n vault -f install.yaml
---
# Use OpenBao (Vault fork, still actively developed)
image:
  repository: ghcr.io/openbao/openbao
  tag: latest
  pullPolicy: IfNotPresent

# === Ephemeral storage (tmpfs — secrets never touch disk) ===
server:
  dataStorage:
    enabled: true
    storageClass: ""  # Use Mayastor
    size: 1Gi
  # In-memory only for the seal/root
  extraEnvironmentVars:
    VAULT_SEAL_TYPE: shamir
    VAULT_LOCAL_CONFIG: |-
      storage "file" {
        path = "/vault/data"
      }
      listener "tcp" {
        address = "0.0.0.0:8200"
        tls_disable = false
        tls_cert_file = "/vault/tls/tls.crt"
        tls_key_file = "/vault/tls/tls.key"
      }
      audit {
        type = "socket"
        address = "victoria-logs-audit:8480"
        socket_type = "tcp"
        log_raw = false
        hmac_accessor = true
        mode = "stream"
      }
      api_addr = "https://vault.internal.slamstack:8200"
      cluster_addr = "https://vault.internal.slamstack:8201"

  # === HA mode ===
  ha:
    enabled: true
    replicas: 1  # 3 for multi-node prod
    raft:
      enabled: true
      setNodeId: true
      config: |
        storage "raft" {
          path = "/vault/data"
          node_id = "vault-0"
          retry_join {
            leader_api_addr = "https://vault-0.vault-internal:8200"
          }
        }
        cluster_name = "slam-stack"
        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = false
        }
        seal "shamir" {}
        audit "socket" {
          address = "victoria-logs-audit:8480"
          socket_type = "tcp"
          mode = "stream"
        }

  # === Auto-unseal via TPM (requires TPM device) ===
  # For dev without TPM, use shamir + manual unseal
  # For prod with TPM, swap seal config:
  # seal "pkcs11" {
  #   lib = "/usr/lib/x86_64-linux-gnu/libtpm2_pkcs11.so"
  #   slot = "0"
  #   pin = ""
  #   key_label = "vault-unseal"
  #   mechanism = 0x1089
  # }

  # === Ingress ===
  service:
    enabled: true
    type: ClusterIP

  # === Audit device ===
  auditStorage:
    enabled: false  # We stream to VictoriaLogs instead

# === Injector (sidecar for secret injection) ===
injector:
  enabled: true
  extraEnvironmentVars:
    AGENT_INJECT_VAULT_ADDR: https://vault.internal.slamstack:8200

# === Security context ===
global:
  podSecurityPolicy:
    enabled: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 10000
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

# === Resources ===
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
