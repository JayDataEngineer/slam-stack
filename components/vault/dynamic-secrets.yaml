# Slam Stack — Vault Dynamic Secret Configurations
# Apply after Vault is initialized and unsealed
# Usage: vault operator init -key-shares=1 -key-threshold=1
#        vault operator unseal <key>
---
# === PKI Engine (internal mTLS certificates) ===
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-pki-setup
  namespace: vault
data:
  setup.sh: |
    #!/bin/sh
    set -e

    # Enable PKI
    vault secrets enable pki
    vault secrets tune -max-lease-ttl=87600h pki

    # Generate root CA (offline by default)
    vault write -field=certificate pki/root/generate/internal \
      common_name="Slam Stack Internal CA" \
      ttl=87600h > slam-ca.crt

    # Enable intermediate PKI for workload certs
    vault secrets enable -path=pki_int pki
    vault secrets tune -max-lease-ttl=43800h pki_int

    # Create role for short-lived mTLS certs (24h max)
    vault write pki_int/roles/slam-stack-workload \
      allowed_domains="slamstack.internal" \
      allow_subdomains=true \
      max_ttl=24h \
      key_usage="DigitalSignature,KeyEncipherment" \
      ext_key_usage="ServerAuth,ClientAuth"

    # Create role for Vault agent certs
    vault write pki_int/roles/vault-agent \
      allowed_domains="vault.internal.slamstack" \
      allow_subdomains=true \
      max_ttl=72h

---
# === Database Engine (dynamic SurrealDB credentials) ===
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-db-setup
  namespace: vault
data:
  setup.sh: |
    #!/bin/sh
    set -e

    vault secrets enable database

    # Configure SurrealDB connection
    vault write database/config/surrealdb \
      plugin_name=postgresql-database-plugin \
      allowed_roles="slam-stack-app" \
      connection_url="postgresql://{{username}}:{{password}}@surrealdb:5432/slamstack?sslmode=verify-full" \
      username="vault-admin" \
      password="$(cat /etc/vault/surrealdb-init-password)"

    # Dynamic role: 15-minute credentials
    vault write database/roles/slam-stack-app \
      db_name=surrealdb \
      creation_statements="CREATE USER \"{{name}}\" WITH PASSWORD '{{password}}' VALID UNTIL '{{expiration}}'; GRANT ALL ON DATABASE slamstack TO \"{{name}}\";" \
      default_ttl=15m \
      max_ttl=15m

---
# === AppRole for workload identity ===
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-approle-setup
  namespace: vault
data:
  setup.sh: |
    #!/bin/sh
    vault auth enable approle
    vault write auth/approle/role/slam-stack-workload \
      token_ttl=30m \
      token_max_ttl=24h \
      policies=slam-stack-workload \
      secret_id_ttl=10m \
      secret_id_num_uses=1
