---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 1h
  chart:
    spec:
      chart: openbao
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: ghcr.io/openbao/openbao
      tag: latest
      pullPolicy: IfNotPresent
    server:
      dataStorage:
        enabled: true
        storageClass: ""
        size: 1Gi
      extraEnvironmentVars:
        VAULT_SEAL_TYPE: pkcs11
        VAULT_LOCAL_CONFIG: |-
          storage "file" { path = "/vault/data" }
          listener "tcp" {
            address = "127.0.0.1:8200"
            tls_disable = false
            tls_cert_file = "/vault/tls/tls.crt"
            tls_key_file = "/vault/tls/tls.key"
          }
          audit { enabled = true }
          api_addr = "https://vault.vault.svc.cluster.local:8200"
          cluster_addr = "https://vault.vault.svc.cluster.local:8201"
      extraVolumes:
        - type: secret
          name: vault-tls
          path: /vault/tls
      service:
        enabled: true
        type: ClusterIP
        port: 8200
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
