---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-single
      sourceRef:
        kind: HelmRepository
        name: vm
        namespace: flux-system
      interval: 1h
  values:
    replicaCount: 1
    server:
      persistentVolume:
        enabled: true
        size: 10Gi
        storageClassName: mayastor
      retentionPeriod: 30d
      extraArgs:
        - -promscrape.kubernetesApi=true
        - -promscrape.serviceDiscovery.kubernetesApi=true
        - -selfScrapeInterval=30s
        - -search.maxQueryDuration=30s
      alertmanager:
        enabled: true
        config:
          global:
            resolve_timeout: 5m
          route:
            group_by: ["alertname", "namespace"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: "victoria-logs"
          receivers:
            - name: "victoria-logs"
              webhook_configs:
                - url: "http://victoria-logs.observability.svc.cluster.local:8480/alert"
                  send_resolved: true
    alerting:
      rules:
        security:
          - alert: SecurityEventTetragonKill
            expr: increase(tetragon_process_exec_total{__name__=~".*sigkill.*"}[5m]) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Tetragon killed a process"
              description: "Tetragon enforced a security policy kill in the last 5 minutes."
          - alert: PodShellExecutionBlocked
            expr: increase(tetragon_process_exec_total{binary=~"/bin/sh|/bin/bash|/usr/bin/bash"}[5m]) > 0
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Shell execution attempted in pod"
              description: "Someone attempted to execute a shell inside a pod (blocked by Tetragon)."
        infrastructure:
          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Pod OOMKilled"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled."
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod is crash looping"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in 15m."
          - alert: PodNotReady
            expr: kube_pod_status_phase{phase!="Running"} == 1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Pod not running"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not running (phase: {{ $labels.phase }})."
          - alert: DiskSpaceLow
            expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Disk almost full"
              description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | humanizePercentage }} full."
          - alert: HighCPU
            expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod) > 0.9
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage"
              description: "Pod {{ $labels.pod }} CPU usage above 90% for 10 minutes."
        certificates:
          - alert: CertExpiringSoon
            expr: certmanager_certificate_expiration_timestamp_seconds - time() < 86400 * 7
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "Certificate expiring within 7 days"
              description: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in less than 7 days."
          - alert: CertExpired
            expr: certmanager_certificate_expiration_timestamp_seconds - time() < 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Certificate has expired"
              description: "Certificate {{ $labels.name }} in {{ $labels.namespace }} has EXPIRED."
    extraScrapeConfigs: |
      - job_name: "cilium-hubble"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["kube-system"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_k8s_app]
            regex: cilium
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: hubble-metrics
            action: keep
      - job_name: "tetragon"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["kube-system"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: tetragon
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: metrics
            action: keep
      - job_name: "kubelet"
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: "(.+):(.+)"
            target_label: __address__
            replacement: "${1}:10250"
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10000
      fsGroup: 10000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    service:
      type: ClusterIP
      ports:
        http: 8428
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
