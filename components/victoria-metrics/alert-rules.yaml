# Slam Stack — Alerting Rules (VictoriaMetrics format)
# Evaluated by VictoriaMetrics single-node, sent to embedded AlertManager
# Alerts are forwarded to VictoriaLogs for immutable audit trail
---
groups:
  - name: security
    rules:
      - alert: SecurityEventTetragonKill
        expr: increase(tetragon_process_exec_total{__name__=~".*sigkill.*"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Tetragon killed a process"
          description: "Tetragon enforced a security policy kill in the last 5 minutes."

      - alert: PodShellExecutionBlocked
        expr: increase(tetragon_process_exec_total{binary=~"/bin/sh|/bin/bash|/usr/bin/bash"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Shell execution attempted in pod"
          description: "Someone attempted to execute a shell inside a pod (blocked by Tetragon)."

  - name: infrastructure
    rules:
      - alert: PodOOMKilled
        expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Pod OOMKilled"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled."

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in 15m."

      - alert: PodNotReady
        expr: kube_pod_status_phase{phase!="Running"} == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod not running"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not running (phase: {{ $labels.phase }})."

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk almost full"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | humanizePercentage }} full."

      - alert: HighCPU
        expr: sum(rate(container_cpu_usage_seconds_total{container!=""}[5m])) by (pod) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "Pod {{ $labels.pod }} CPU usage above 90% for 10 minutes."

  - name: certificates
    rules:
      - alert: CertExpiringSoon
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 86400 * 7
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Certificate expiring within 7 days"
          description: "Certificate {{ $labels.name }} in {{ $labels.namespace }} expires in less than 7 days."

      - alert: CertExpired
        expr: certmanager_certificate_expiration_timestamp_seconds - time() < 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Certificate has expired"
          description: "Certificate {{ $labels.name }} in {{ $labels.namespace }} has EXPIRED."
