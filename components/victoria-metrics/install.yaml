# Slam Stack — VictoriaMetrics Single-Node (Metrics + Alerting)
# Drop-in Prometheus replacement, ~128Mi RAM
# Scrapes Cilium Hubble, Tetragon, and kubelet metrics
# Install: helm upgrade --install victoria-metrics vm/victoria-metrics-single -n observability -f install.yaml
---
replicaCount: 1

server:
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClassName: mayastor

  retentionPeriod: 30d

  extraArgs:
    - -promscrape.kubernetesApi=true
    - -promscrape.serviceDiscovery.kubernetesApi=true
    - -selfScrapeInterval=30s
    - -search.maxQueryDuration=30s

  # Embedded alertmanager
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: "victoria-logs"
      receivers:
        - name: "victoria-logs"
          # Alerts are logged to VictoriaLogs via the audit pipeline
          webhook_configs:
            - url: "http://victoria-logs.observability.svc.cluster.local:8480/alert"
              send_resolved: true

# Scrape Cilium Hubble + Tetragon
extraScrapeConfigs: |
  - job_name: "cilium-hubble"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["kube-system"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_k8s_app]
        regex: cilium
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        regex: hubble-metrics
        action: keep
  - job_name: "tetragon"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["kube-system"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        regex: tetragon
        action: keep
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        regex: metrics
        action: keep
  - job_name: "kubelet"
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.+):(.+)"
        target_label: __address__
        replacement: "${1}:10250"
      - source_labels: [__meta_kubernetes_node_name]
        target_label: node

# === Security context ===
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10000
  fsGroup: 10000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

# === Network ===
service:
  type: ClusterIP
  ports:
    http: 8428

# === Resources ===
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
