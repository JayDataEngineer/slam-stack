# Slam Stack — Kanidm Identity Provider
# Rust-based IDP with WebAuthn/Passkeys + OAuth2/OIDC
# No official Helm chart — deployed via raw K8s manifests
# Config: flat TOML (Kanidm does not support sectioned config)
---
apiVersion: v1
kind: Namespace
metadata:
  name: identity
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kanidm-data
  namespace: identity
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kanidm-config
  namespace: identity
data:
  kanidm.toml: |
    # Kanidm uses flat TOML — no [section] blocks supported
    bindaddress = "0.0.0.0:443"
    ldapbindaddress = "0.0.0.0:636"
    trust_x_forward_for = true
    tls_chain = "/etc/kanidm/tls/tls.crt"
    tls_key = "/etc/kanidm/tls/tls.key"
    db_path = "/data/kanidm.db"
    domain = "identity.svc.cluster.local"
    origin = "https://kanidm.identity.svc.cluster.local"
    log_level = "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kanidm
  namespace: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kanidm
  template:
    metadata:
      labels:
        app: kanidm
    spec:
      serviceAccountName: kanidm
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        fsGroup: 10000
      containers:
        - name: kanidm
          image: kanidm/server:latest
          env:
            - name: KANIDM_CONFIG
              value: "/etc/kanidm/kanidm.toml"
          ports:
            - containerPort: 443
              name: https
            - containerPort: 636
              name: ldaps
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/kanidm/kanidm.toml
              subPath: kanidm.toml
            - name: tls
              mountPath: /etc/kanidm/tls
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /status
              port: 443
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: 443
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kanidm-data
        - name: config
          configMap:
            name: kanidm-config
        - name: tls
          secret:
            secretName: kanidm-tls
---
apiVersion: v1
kind: Service
metadata:
  name: kanidm
  namespace: identity
  annotations:
    # Advertise to Cilium for network policies
    cilium.io/use-cilium-endpoint: "true"
spec:
  type: ClusterIP
  selector:
    app: kanidm
  ports:
    - name: https
      port: 443
      targetPort: 443
    - name: ldaps
      port: 636
      targetPort: 636
