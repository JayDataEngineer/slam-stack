# Slam Stack — GitOps Bootstrap (Flux)
# Enables GitOps workflow: all cluster state sourced from Git.
# Dev (Talos VM) and Prod (bare metal) point at the same repo.
#
# Install: flux bootstrap git --url=... --path=./clusters/dev
#
# Architecture:
#   Repo root/
#   ├── clusters/
#   │   ├── dev/       # Flux config for dev cluster
#   │   └── prod/      # Flux config for prod cluster
#   ├── components/    # Shared Kustomize bases (same dir as our manifests)
#   └── config/        # Environment-specific overlays
---
apiVersion: v1
kind: Namespace
metadata:
  name: flux-system
---
# Flux pre-requisites: ensure SOPS + Age key is available
apiVersion: v1
kind: Secret
metadata:
  name: sops-age
  namespace: flux-system
type: Opaque
stringData:
  # Paste your age private key here (from gpg/sops-setup.sh)
  # For dev, you can use a dev-only key
  # For prod, this should live on a YubiKey
  age.agekey: ""
---
# Enable Flux's SOPS decryption
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-sops
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: slam-stack
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/JayDataEngineer/slam-stack  # CHANGE ME
  ref:
    branch: main
  secretRef:
    name: flux-git-auth  # Create this secret with your Git token
---
# Flux will sync everything in components/ to the cluster (core infra).
# For the matrix flavor, add a separate Kustomization with:
#   path: ./flavors/matrix
# For the OG flavor, separate Kustomization with:
#   path: ./flavors/og
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: components
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: slam-stack
  path: ./components
  prune: true
  validation: client
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: kanidm
      namespace: identity
    # Add flavor-specific health checks as needed:
    # OG: stalwart (mail), smp-server (comms), xftp-server (comms)
    # Matrix: matrix (matrix), cinny (matrix), livekit (matrix)
  patches:
    # All pods inherit the Slam Stack security context
    - target:
        kind: Pod
      patch: |
        - op: add
          path: /spec/securityContext
          value:
            runAsNonRoot: true
            runAsUser: 10000
            fsGroup: 10000
