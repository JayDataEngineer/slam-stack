# Slam Stack — TLS Certificates (managed by cert-manager + Vault PKI)
# Auto-rotated 7 days before 30-day expiry
# Apply AFTER vault-issuer.yaml and Vault PKI is configured
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kanidm-tls
  namespace: identity
spec:
  secretName: kanidm-tls
  duration: 720h
  renewBefore: 168h
  issuerRef:
    name: vault-pki-issuer
    kind: ClusterIssuer
  dnsNames:
    - kanidm.identity
    - kanidm.identity.svc.cluster.local
    - id.slamstack.internal
  usages:
    - server auth
    - client auth
  privateKey:
    algorithm: ECDSA
    size: 256
