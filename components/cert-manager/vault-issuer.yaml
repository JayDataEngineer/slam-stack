# Slam Stack — Vault PKI ClusterIssuer for cert-manager
# Connects cert-manager to the Vault PKI intermediate already configured
# Apply AFTER both cert-manager and Vault are deployed
---
# AppRole credentials for cert-manager to authenticate with Vault
apiVersion: v1
kind: Secret
metadata:
  name: vault-approle-secret
  namespace: cert-manager
type: Opaque
data:
  # Base64-encoded AppRole Secret ID — generated by vault setup script
  # Run: vault write -field=secret_id auth/approle/role/cert-manager/secret-id | base64
  secretid: ""
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-pki-issuer
spec:
  vault:
    server: https://vault.vault.svc.cluster.local:8200
    path: pki_int/sign/slam-stack-workload
    auth:
      appRole:
        path: approle
        roleId: ""
        secretRef:
          name: vault-approle-secret
          key: secretid
