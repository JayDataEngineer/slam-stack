# Slam Stack — Tetragon Enforcement Policies
# These run inside the kernel via eBPF.
# They KILL processes that violate the rules — not just log them.
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-shell-execution
spec:
  description: "Kill any process that spawns a shell inside a pod"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/bin/sh"
                - "/bin/bash"
                - "/bin/dash"
                - "/bin/zsh"
                - "/bin/ash"
                - "/usr/bin/sh"
                - "/usr/bin/bash"
                - "/usr/bin/zsh"
                - "sh"
                - "bash"
                - "dash"
                - "zsh"
                - "ash"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-packet-tools
spec:
  description: "Kill processes using packet capture tools"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/bin/tcpdump"
                - "/usr/sbin/tcpdump"
                - "/usr/bin/tshark"
                - "/usr/bin/nmap"
                - "/usr/bin/ncat"
                - "/usr/bin/nc"
                - "/bin/nc"
                - "/usr/sbin/tcpdump"
                - "/usr/bin/ngrep"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-mount-commands
spec:
  description: "Kill mount-related commands"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/bin/mount"
                - "/usr/bin/mount"
                - "/bin/umount"
                - "/usr/bin/umount"
                - "/usr/sbin/mount"
                - "/usr/sbin/umount"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-suid-binaries
spec:
  description: "Block execution of known dangerous SUID binaries"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/bin/pkexec"
                - "/usr/bin/su"
                - "/usr/bin/sudo"
                - "/bin/su"
                - "/usr/bin/newgrp"
                - "/usr/bin/chsh"
                - "/usr/bin/chfn"
                - "/usr/bin/gpasswd"
                - "/usr/bin/passwd"
                - "/usr/sbin/unix_chkpwd"
                - "/usr/sbin/pam_timestamp_check"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-crypto-miners
spec:
  description: "Kill known crypto mining processes"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "xmrig"
                - "cpuminer"
                - "minerd"
                - "ccminer"
                - "ethminer"
                - "sgminer"
                - "bfgminer"
                - "cgminer"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-download-tools
spec:
  description: "Kill download tools — no fetching external resources inside pods"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/bin/wget"
                - "/usr/bin/curl"
                - "/usr/bin/aria2c"
                - "/usr/bin/axel"
                - "/usr/local/bin/wget"
                - "/usr/local/bin/curl"
                - "wget"
                - "curl"
                - "aria2c"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-remote-access
spec:
  description: "Kill remote access tools — no SSH, telnet, or rsh inside pods"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/bin/ssh"
                - "/usr/bin/scp"
                - "/usr/bin/sftp"
                - "/usr/bin/telnet"
                - "/usr/bin/rsh"
                - "/usr/bin/sshpass"
                - "/usr/bin/autossh"
                - "/usr/sbin/sshd"
                - "ssh"
                - "scp"
                - "sftp"
                - "telnet"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-process-injection
spec:
  description: "Kill any ptrace attach attempt — prevents process injection and debugging"
  kprobes:
    - call: "sys_ptrace"
      syscall: true
      args:
        - index: 0
          type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "16"  # PTRACE_ATTACH
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-container-escape
spec:
  description: "Kill attempts to access container runtime sockets — prevents container escape"
  kprobes:
    - call: "sys_openat"
      syscall: true
      args:
        - index: 1
          type: "string"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/var/run/docker.sock"
                - "/run/docker.sock"
                - "/run/containerd.sock"
                - "/var/run/containerd.sock"
                - "/run/crio/crio.sock"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-memory-access
spec:
  description: "Kill attempts to access raw memory devices — prevents memory manipulation"
  kprobes:
    - call: "sys_openat"
      syscall: true
      args:
        - index: 1
          type: "string"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/dev/mem"
                - "/dev/kmem"
                - "/dev/port"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-debug-tools
spec:
  description: "Kill debugging and inspection tools inside pods"
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "string"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/bin/gdb"
                - "/usr/bin/strace"
                - "/usr/bin/ltrace"
                - "/usr/bin/lsof"
                - "/usr/bin/objdump"
                - "/usr/bin/readelf"
                - "/usr/bin/strings"
                - "gdb"
                - "strace"
                - "ltrace"
                - "lsof"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-sensitive-file-read
spec:
  description: "Kill attempts to read sensitive system files from inside pods"
  kprobes:
    - call: "sys_openat"
      syscall: true
      args:
        - index: 1
          type: "string"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/etc/shadow"
                - "/etc/passwd"
                - "/etc/gshadow"
                - "/etc/ssh/sshd_config"
          matchActions:
            - action: Sigkill
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: block-data-exfil-devices
spec:
  description: "Kill dd and file copy to network device files — prevents data exfiltration"
  kprobes:
    - call: "sys_openat"
      syscall: true
      args:
        - index: 1
          type: "string"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Postfix"
              values:
                - "/dev/tcp/"
                - "/dev/udp/"
          matchActions:
            - action: Sigkill
