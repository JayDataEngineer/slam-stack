# Sample Rust workload — slam-stack deployment manifests.
#
# This is a *reference* — copy and adapt for your own workload.
# Demonstrates every slam-stack security posture:
#   - ServiceAccount with no automounted token
#   - Non-root, read-only rootfs, all caps dropped, seccomp RuntimeDefault
#   - Resource limits (Kyverno will reject without these)
#   - NetworkPolicy allowing only Headscale ingress on 8080
#   - Pod-level annotations for Cosign verification
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sample-app
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
